<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram 消息分类仪表盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      opacity: 0.9;
      font-size: 1.1rem;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-card .icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: bold;
      color: #333;
    }

    .stat-card .label {
      color: #666;
      font-size: 0.9rem;
      margin-top: 5px;
    }

    /* Category Colors */
    .stat-card.question { border-left: 4px solid #3b82f6; }
    .stat-card.complaint { border-left: 4px solid #ef4444; }
    .stat-card.order { border-left: 4px solid #f59e0b; }
    .stat-card.suggestion { border-left: 4px solid #10b981; }
    .stat-card.chitchat { border-left: 4px solid #8b5cf6; }
    .stat-card.technical { border-left: 4px solid #ec4899; }
    .stat-card.other { border-left: 4px solid #6b7280; }
    .stat-card.total { border-left: 4px solid #0ea5e9; }

    /* Main Content */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    /* Card */
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-header h2 {
      font-size: 1.2rem;
      color: #333;
    }

    .card-body {
      padding: 24px;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      background: #f5f5f5;
    }

    .filter-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    /* Search */
    .search-box {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .search-box input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }

    .search-box input:focus {
      border-color: #667eea;
    }

    /* Message List */
    .message-list {
      max-height: 600px;
      overflow-y: auto;
    }

    .message-item {
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .message-item:hover {
      background: #f9fafb;
      margin: 0 -24px;
      padding: 16px 24px;
    }

    .message-item:last-child {
      border-bottom: none;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .message-user {
      font-weight: 600;
      color: #333;
    }

    .message-time {
      font-size: 0.8rem;
      color: #999;
    }

    .message-content {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .message-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .tag.category-question { background: #dbeafe; color: #1d4ed8; }
    .tag.category-complaint { background: #fee2e2; color: #b91c1c; }
    .tag.category-order { background: #fef3c7; color: #b45309; }
    .tag.category-suggestion { background: #d1fae5; color: #047857; }
    .tag.category-chitchat { background: #ede9fe; color: #6d28d9; }
    .tag.category-technical { background: #fce7f3; color: #be185d; }
    .tag.category-other { background: #f3f4f6; color: #4b5563; }

    .tag.sentiment-positive { background: #dcfce7; color: #15803d; }
    .tag.sentiment-neutral { background: #f3f4f6; color: #4b5563; }
    .tag.sentiment-negative { background: #fee2e2; color: #b91c1c; }

    .tag.urgency-urgent { background: #fee2e2; color: #b91c1c; }
    .tag.urgency-normal { background: #fef3c7; color: #b45309; }
    .tag.urgency-low { background: #e0f2fe; color: #0369a1; }

    /* Sidebar Charts */
    .chart-section {
      margin-bottom: 20px;
    }

    .chart-title {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 15px;
    }

    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bar-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bar-label {
      width: 80px;
      font-size: 0.8rem;
      color: #666;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .bar-value {
      width: 30px;
      font-size: 0.8rem;
      color: #333;
      text-align: right;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1.1rem;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #999;
    }

    .modal-body {
      padding: 24px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 5px;
    }

    .detail-value {
      font-size: 1rem;
      color: #333;
    }

    .confidence-bar {
      height: 6px;
      background: #f0f0f0;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      background: #667eea;
      border-radius: 3px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    /* Refresh Button */
    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s ease;
    }

    .refresh-btn:hover {
      background: #5a67d8;
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-item {
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🤖 Telegram 消息分类仪表盘</h1>
      <p>实时监控与分析用户对话内容</p>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <!-- 动态生成 -->
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Message List -->
      <div class="card">
        <div class="card-header">
          <h2>📨 消息列表</h2>
          <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
        </div>
        <div class="card-body">
          <!-- Filters -->
          <div class="filters" id="categoryFilters">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="question">问题咨询</button>
            <button class="filter-btn" data-category="complaint">投诉反馈</button>
            <button class="filter-btn" data-category="order">订单相关</button>
            <button class="filter-btn" data-category="suggestion">建议反馈</button>
            <button class="filter-btn" data-category="technical">技术问题</button>
            <button class="filter-btn" data-category="chitchat">闲聊</button>
            <button class="filter-btn" data-category="other">其他</button>
          </div>
          
          <!-- Search -->
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索消息内容...">
          </div>

          <!-- Message List -->
          <div class="message-list" id="messageList" style="margin-top: 20px;">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Category Distribution -->
        <div class="card">
          <div class="card-header">
            <h2>📊 分类分布</h2>
          </div>
          <div class="card-body">
            <div class="chart-section">
              <div class="chart-title">主题分类</div>
              <div class="bar-chart" id="categoryChart">
                <!-- 动态生成 -->
              </div>
            </div>
          </div>
        </div>

        <!-- Sentiment Distribution -->
        <div class="card" style="margin-top: 20px;">
          <div class="card-header">
            <h2>😊 情感分析</h2>
          </div>
          <div class="card-body">
            <div class="bar-chart" id="sentimentChart">
              <!-- 动态生成 -->
            </div>
          </div>
        </div>

        <!-- Urgency Distribution -->
        <div class="card" style="margin-top: 20px;">
          <div class="card-header">
            <h2>⚡ 紧急程度</h2>
          </div>
          <div class="card-body">
            <div class="bar-chart" id="urgencyChart">
              <!-- 动态生成 -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3>📋 消息详情</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- 动态生成 -->
      </div>
    </div>
  </div>

  <script>
    // 数据存储
    let allMessages = [];
    let filteredMessages = [];
    let currentFilter = 'all';

    // 分类配置
    const categoryConfig = {
      question: { name: '问题咨询', color: '#3b82f6', emoji: '❓' },
      complaint: { name: '投诉反馈', color: '#ef4444', emoji: '😤' },
      order: { name: '订单相关', color: '#f59e0b', emoji: '📦' },
      suggestion: { name: '建议反馈', color: '#10b981', emoji: '💡' },
      chitchat: { name: '闲聊', color: '#8b5cf6', emoji: '💬' },
      technical: { name: '技术问题', color: '#ec4899', emoji: '🔧' },
      other: { name: '其他', color: '#6b7280', emoji: '📝' }
    };

    const sentimentConfig = {
      positive: { name: '正面', color: '#10b981', emoji: '😊' },
      neutral: { name: '中性', color: '#6b7280', emoji: '😐' },
      negative: { name: '负面', color: '#ef4444', emoji: '😞' }
    };

    const urgencyConfig = {
      urgent: { name: '紧急', color: '#ef4444', emoji: '🔴' },
      normal: { name: '普通', color: '#f59e0b', emoji: '🟡' },
      low: { name: '低', color: '#3b82f6', emoji: '🟢' }
    };

    // 示例数据（实际使用时从后端加载）
    const sampleData = [
      {
        messageId: 'msg_001',
        timestamp: '2026-03-30T10:15:00.000Z',
        userId: 'user_001',
        username: '张三',
        content: '请问这个产品怎么使用？我刚买了一个，不太会操作。',
        category: { id: 'question', name: '问题咨询', confidence: 0.85 },
        sentiment: { label: 'neutral', confidence: 0.7 },
        urgency: { level: 'normal', confidence: 0.6 },
        keywords: ['产品', '使用', '操作']
      },
      {
        messageId: 'msg_002',
        timestamp: '2026-03-30T10:18:00.000Z',
        userId: 'user_002',
        username: '李四',
        content: '我想投诉！订单已经三天了还没发货，太差了！要求退款！',
        category: { id: 'complaint', name: '投诉反馈', confidence: 0.92 },
        sentiment: { label: 'negative', confidence: 0.95 },
        urgency: { level: 'urgent', confidence: 0.88 },
        keywords: ['投诉', '订单', '发货', '退款']
      },
      {
        messageId: 'msg_003',
        timestamp: '2026-03-30T10:22:00.000Z',
        userId: 'user_003',
        username: '王五',
        content: '系统报错了，显示500错误，无法登录账号，请尽快处理。',
        category: { id: 'technical', name: '技术问题', confidence: 0.88 },
        sentiment: { label: 'neutral', confidence: 0.65 },
        urgency: { level: 'urgent', confidence: 0.75 },
        keywords: ['系统', '报错', '500错误', '登录']
      },
      {
        messageId: 'msg_004',
        timestamp: '2026-03-30T10:25:00.000Z',
        userId: 'user_004',
        username: '赵六',
        content: '非常满意这次服务！发货很快，产品质量也很好，谢谢你们！',
        category: { id: 'other', name: '其他', confidence: 0.5 },
        sentiment: { label: 'positive', confidence: 0.92 },
        urgency: { level: 'low', confidence: 0.7 },
        keywords: ['满意', '服务', '发货', '质量']
      },
      {
        messageId: 'msg_005',
        timestamp: '2026-03-30T10:30:00.000Z',
        userId: 'user_005',
        username: '孙七',
        content: '你好，在吗？今天天气真不错啊，聊聊？',
        category: { id: 'chitchat', name: '闲聊', confidence: 0.78 },
        sentiment: { label: 'positive', confidence: 0.8 },
        urgency: { level: 'low', confidence: 0.85 },
        keywords: ['你好', '天气', '聊聊']
      },
      {
        messageId: 'msg_006',
        timestamp: '2026-03-30T10:35:00.000Z',
        userId: 'user_006',
        username: '周八',
        content: '建议你们可以增加夜间客服，这样我们下班后也能咨询问题。',
        category: { id: 'suggestion', name: '建议反馈', confidence: 0.82 },
        sentiment: { label: 'neutral', confidence: 0.75 },
        urgency: { level: 'normal', confidence: 0.65 },
        keywords: ['建议', '夜间客服', '咨询']
      },
      {
        messageId: 'msg_007',
        timestamp: '2026-03-30T10:40:00.000Z',
        userId: 'user_007',
        username: '吴九',
        content: '我的订单号是202403150001，想查询一下物流状态。',
        category: { id: 'order', name: '订单相关', confidence: 0.9 },
        sentiment: { label: 'neutral', confidence: 0.8 },
        urgency: { level: 'normal', confidence: 0.7 },
        keywords: ['订单', '订单号', '物流']
      }
    ];

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      setupEventListeners();
    });

    // 加载数据
    function loadData() {
      // 从后端API获取数据
      fetch('/api/messages')
        .then(r => r.json())
        .then(data => {
          allMessages = data;
          filteredMessages = [...allMessages];
          updateStats();
          renderMessages();
          renderCharts();
        })
        .catch(err => {
          console.error('Failed to load data:', err);
          // 如果API失败，使用示例数据
          allMessages = sampleData;
          filteredMessages = [...allMessages];
          updateStats();
          renderMessages();
          renderCharts();
        });
    }

    // 更新统计数据
    function updateStats() {
      const stats = {
        total: allMessages.length,
        question: 0,
        complaint: 0,
        order: 0,
        suggestion: 0,
        chitchat: 0,
        technical: 0,
        other: 0
      };

      allMessages.forEach(msg => {
        if (stats.hasOwnProperty(msg.category.id)) {
          stats[msg.category.id]++;
        }
      });

      const statsGrid = document.getElementById('statsGrid');
      statsGrid.innerHTML = `
        <div class="stat-card total">
          <div class="icon">📊</div>
          <div class="value">${stats.total}</div>
          <div class="label">总消息数</div>
        </div>
        <div class="stat-card question">
          <div class="icon">❓</div>
          <div class="value">${stats.question}</div>
          <div class="label">问题咨询</div>
        </div>
        <div class="stat-card complaint">
          <div class="icon">😤</div>
          <div class="value">${stats.complaint}</div>
          <div class="label">投诉反馈</div>
        </div>
        <div class="stat-card order">
          <div class="icon">📦</div>
          <div class="value">${stats.order}</div>
          <div class="label">订单相关</div>
        </div>
        <div class="stat-card technical">
          <div class="icon">🔧</div>
          <div class="value">${stats.technical}</div>
          <div class="label">技术问题</div>
        </div>
      `;
    }

    // 渲染消息列表
    function renderMessages() {
      const messageList = document.getElementById('messageList');
      
      if (filteredMessages.length === 0) {
        messageList.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <p>暂无消息数据</p>
          </div>
        `;
        return;
      }

      messageList.innerHTML = filteredMessages.map(msg => `
        <div class="message-item" onclick="showDetail('${msg.messageId}')">
          <div class="message-header">
            <span class="message-user">${msg.username || '匿名用户'}</span>
            <span class="message-time">${formatTime(msg.timestamp)}</span>
          </div>
          <div class="message-content">${truncateText(msg.content, 100)}</div>
          <div class="message-tags">
            <span class="tag category-${msg.category.id}">${categoryConfig[msg.category.id]?.name || msg.category.name}</span>
            <span class="tag sentiment-${msg.sentiment.label}">${sentimentConfig[msg.sentiment.label].emoji} ${sentimentConfig[msg.sentiment.label].name}</span>
            <span class="tag urgency-${msg.urgency.level}">${urgencyConfig[msg.urgency.level].emoji} ${urgencyConfig[msg.urgency.level].name}</span>
          </div>
        </div>
      `).join('');
    }

    // 渲染图表
    function renderCharts() {
      renderCategoryChart();
      renderSentimentChart();
      renderUrgencyChart();
    }

    function renderCategoryChart() {
      const counts = {};
      allMessages.forEach(msg => {
        counts[msg.category.id] = (counts[msg.category.id] || 0) + 1;
      });

      const total = allMessages.length || 1;
      const chartEl = document.getElementById('categoryChart');
      
      chartEl.innerHTML = Object.entries(categoryConfig).map(([id, config]) => {
        const count = counts[id] || 0;
        const percent = (count / total * 100).toFixed(0);
        return `
          <div class="bar-item">
            <span class="bar-label">${config.emoji} ${config.name}</span>
            <div class="bar-track">
              <div class="bar-fill" style="width: ${percent}%; background: ${config.color}"></div>
            </div>
            <span class="bar-value">${count}</span>
          </div>
        `;
      }).join('');
    }

    function renderSentimentChart() {
      const counts = { positive: 0, neutral: 0, negative: 0 };
      allMessages.forEach(msg => {
        counts[msg.sentiment.label]++;
      });

      const total = allMessages.length || 1;
      const chartEl = document.getElementById('sentimentChart');
      
      chartEl.innerHTML = Object.entries(sentimentConfig).map(([id, config]) => {
        const count = counts[id] || 0;
        const percent = (count / total * 100).toFixed(0);
        return `
          <div class="bar-item">
            <span class="bar-label">${config.emoji} ${config.name}</span>
            <div class="bar-track">
              <div class="bar-fill" style="width: ${percent}%; background: ${config.color}"></div>
            </div>
            <span class="bar-value">${count}</span>
          </div>
        `;
      }).join('');
    }

    function renderUrgencyChart() {
      const counts = { urgent: 0, normal: 0, low: 0 };
      allMessages.forEach(msg => {
        counts[msg.urgency.level]++;
      });

      const total = allMessages.length || 1;
      const chartEl = document.getElementById('urgencyChart');
      
      chartEl.innerHTML = Object.entries(urgencyConfig).map(([id, config]) => {
        const count = counts[id] || 0;
        const percent = (count / total * 100).toFixed(0);
        return `
          <div class="bar-item">
            <span class="bar-label">${config.emoji} ${config.name}</span>
            <div class="bar-track">
              <div class="bar-fill" style="width: ${percent}%; background: ${config.color}"></div>
            </div>
            <span class="bar-value">${count}</span>
          </div>
        `;
      }).join('');
    }

    // 显示详情弹窗
    function showDetail(messageId) {
      const msg = allMessages.find(m => m.messageId === messageId);
      if (!msg) return;

      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <div class="detail-section">
          <div class="detail-label">用户信息</div>
          <div class="detail-value">${msg.username || '匿名用户'} (${msg.userId})</div>
        </div>
        
        <div class="detail-section">
          <div class="detail-label">消息内容</div>
          <div class="detail-value">${msg.content}</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">主题分类</div>
          <div class="detail-value">
            <span class="tag category-${msg.category.id}">${categoryConfig[msg.category.id]?.emoji || '📝'} ${msg.category.name}</span>
            置信度: ${(msg.category.confidence * 100).toFixed(0)}%
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill" style="width: ${msg.category.confidence * 100}%"></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">情感分析</div>
          <div class="detail-value">
            <span class="tag sentiment-${msg.sentiment.label}">${sentimentConfig[msg.sentiment.label].emoji} ${sentimentConfig[msg.sentiment.label].name}</span>
            置信度: ${(msg.sentiment.confidence * 100).toFixed(0)}%
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill" style="width: ${msg.sentiment.confidence * 100}%"></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">紧急程度</div>
          <div class="detail-value">
            <span class="tag urgency-${msg.urgency.level}">${urgencyConfig[msg.urgency.level].emoji} ${urgencyConfig[msg.urgency.level].name}</span>
            置信度: ${(msg.urgency.confidence * 100).toFixed(0)}%
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill" style="width: ${msg.urgency.confidence * 100}%"></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">关键词</div>
          <div class="detail-value">${msg.keywords.length > 0 ? msg.keywords.map(k => `<span class="tag" style="background:#f3f4f6;color:#4b5563">${k}</span>`).join(' ') : '无'}</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">时间</div>
          <div class="detail-value">${new Date(msg.timestamp).toLocaleString('zh-CN')}</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">消息ID</div>
          <div class="detail-value" style="font-family: monospace; font-size: 0.85rem; color: #666;">${msg.messageId}</div>
        </div>
      `;

      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // 设置事件监听
    function setupEventListeners() {
      // 分类筛选
      document.getElementById('categoryFilters').addEventListener('click', (e) => {
        if (e.target.classList.contains('filter-btn')) {
          document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
          e.target.classList.add('active');
          
          currentFilter = e.target.dataset.category;
          applyFilters();
        }
      });

      // 搜索
      document.getElementById('searchInput').addEventListener('input', (e) => {
        applyFilters();
      });

      // 点击遮罩关闭弹窗
      document.getElementById('modalOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'modalOverlay') {
          closeModal();
        }
      });
    }

    // 应用筛选
    function applyFilters() {
      const searchText = document.getElementById('searchInput').value.toLowerCase();
      
      filteredMessages = allMessages.filter(msg => {
        const categoryMatch = currentFilter === 'all' || msg.category.id === currentFilter;
        const searchMatch = !searchText || 
          msg.content.toLowerCase().includes(searchText) ||
          (msg.username && msg.username.toLowerCase().includes(searchText));
        
        return categoryMatch && searchMatch;
      });

      renderMessages();
    }

    // 工具函数
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
      
      return date.toLocaleDateString('zh-CN');
    }

    function truncateText(text, maxLength) {
      if (text.length <= maxLength) return text;
      return text.substring(0, maxLength) + '...';
    }
  </script>
</body>
</html>
