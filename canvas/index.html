<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram 消息分类系统</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
      min-height: 100vh;
      color: var(--gray-800);
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo-text h1 {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .logo-text p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .status-badge {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .refresh-btn {
      background: white;
      color: var(--primary);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-btn:hover {
      background: var(--gray-100);
      transform: translateY(-1px);
    }

    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }

    .stat-card.total::before { background: linear-gradient(90deg, #6366f1, #8b5cf6); }
    .stat-card.question::before { background: #3b82f6; }
    .stat-card.complaint::before { background: #ef4444; }
    .stat-card.order::before { background: #f59e0b; }
    .stat-card.technical::before { background: #ec4899; }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .stat-card.total .stat-icon { background: rgba(99, 102, 241, 0.1); }
    .stat-card.question .stat-icon { background: rgba(59, 130, 246, 0.1); }
    .stat-card.complaint .stat-icon { background: rgba(239, 68, 68, 0.1); }
    .stat-card.order .stat-icon { background: rgba(245, 158, 11, 0.1); }
    .stat-card.technical .stat-icon { background: rgba(236, 72, 153, 0.1); }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1;
    }

    .stat-label {
      color: var(--gray-500);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .stat-change {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      margin-top: 8px;
    }

    .stat-change.up { color: var(--success); }
    .stat-change.down { color: var(--danger); }

    /* Main Content */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
    }

    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gray-900);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-body {
      padding: 24px;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--gray-200);
      background: white;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .filter-count {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
    }

    .filter-btn:not(.active) .filter-count {
      background: var(--gray-100);
    }

    /* Message List */
    .message-list {
      max-height: 500px;
      overflow-y: auto;
    }

    .message-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--gray-100);
      transition: background 0.2s;
    }

    .message-item:hover {
      background: var(--gray-50);
      margin: 0 -24px;
      padding: 16px 24px;
    }

    .message-item:last-child {
      border-bottom: none;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .message-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-weight: 600;
      color: var(--gray-800);
      font-size: 0.95rem;
    }

    .user-id {
      font-size: 0.75rem;
      color: var(--gray-400);
    }

    .message-time {
      color: var(--gray-400);
      font-size: 0.8rem;
    }

    .message-content {
      color: var(--gray-600);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 12px;
      padding-left: 46px;
    }

    .message-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-left: 46px;
    }

    .tag {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tag.category-question { background: #dbeafe; color: #1d4ed8; }
    .tag.category-complaint { background: #fee2e2; color: #b91c1c; }
    .tag.category-order { background: #fef3c7; color: #b45309; }
    .tag.category-technical { background: #fce7f3; color: #be185d; }
    .tag.category-suggestion { background: #d1fae5; color: #047857; }
    .tag.category-chitchat { background: #ede9fe; color: #6d28d9; }
    .tag.category-other { background: var(--gray-100); color: var(--gray-600); }

    .tag.sentiment-positive { background: #dcfce7; color: #15803d; }
    .tag.sentiment-neutral { background: var(--gray-100); color: var(--gray-600); }
    .tag.sentiment-negative { background: #fee2e2; color: #b91c1c; }

    .tag.urgency-urgent { background: #fee2e2; color: #b91c1c; }
    .tag.urgency-normal { background: #fef3c7; color: #b45309; }
    .tag.urgency-low { background: #e0f2fe; color: #0369a1; }

    .confidence {
      font-size: 0.7rem;
      opacity: 0.7;
    }

    /* Charts */
    .chart-container {
      position: relative;
      height: 200px;
      margin-bottom: 24px;
    }

    .sidebar-card {
      margin-bottom: 20px;
    }

    .sidebar-card:last-child {
      margin-bottom: 0;
    }

    /* Bar Chart */
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bar-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      width: 80px;
      font-size: 0.85rem;
      color: var(--gray-600);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--gray-100);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .bar-value {
      width: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gray-800);
      text-align: right;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--gray-400);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    /* Loading */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        gap: 16px;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .stat-card {
        padding: 16px;
      }

      .stat-value {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">🤖</div>
        <div class="logo-text">
          <h1>Telegram 消息分类系统</h1>
          <p>实时消息监控与智能分析平台</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="status-badge">
          <span class="status-dot"></span>
          实时运行中
        </div>
        <button class="refresh-btn" onclick="loadData()">
          <span>🔄</span>
          刷新数据
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card total">
        <div class="stat-icon">📊</div>
        <div class="stat-value">-</div>
        <div class="stat-label">总消息数</div>
      </div>
      <div class="stat-card question">
        <div class="stat-icon">❓</div>
        <div class="stat-value">-</div>
        <div class="stat-label">问题咨询</div>
      </div>
      <div class="stat-card complaint">
        <div class="stat-icon">😤</div>
        <div class="stat-value">-</div>
        <div class="stat-label">投诉反馈</div>
      </div>
      <div class="stat-card order">
        <div class="stat-icon">📦</div>
        <div class="stat-value">-</div>
        <div class="stat-label">订单相关</div>
      </div>
      <div class="stat-card technical">
        <div class="stat-icon">🔧</div>
        <div class="stat-value">-</div>
        <div class="stat-label">技术问题</div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content-grid">
      <!-- Messages Card -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📨 消息列表</h2>
          <span id="messageCount" style="color: var(--gray-500); font-size: 0.9rem;"></span>
        </div>
        <div class="card-body">
          <div class="filters" id="filters"></div>
          <div class="message-list" id="messageList">
            <div class="loading">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Category Chart -->
        <div class="card sidebar-card">
          <div class="card-header">
            <h3 class="card-title">📊 分类分布</h3>
          </div>
          <div class="card-body">
            <div class="chart-container">
              <canvas id="categoryChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Sentiment Chart -->
        <div class="card sidebar-card">
          <div class="card-header">
            <h3 class="card-title">😊 情感分析</h3>
          </div>
          <div class="card-body">
            <div class="chart-container">
              <canvas id="sentimentChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Urgency Chart -->
        <div class="card sidebar-card">
          <div class="card-header">
            <h3 class="card-title">⚡ 紧急程度</h3>
          </div>
          <div class="card-body">
            <div class="bar-chart" id="urgencyChart"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    Telegram 消息分类系统 © 2026 | 数据更新时间: <span id="updateTime">-</span>
  </footer>

  <script>
    // 配置
    const categoryConfig = {
      question: { name: '问题咨询', color: '#3b82f6', emoji: '❓' },
      complaint: { name: '投诉反馈', color: '#ef4444', emoji: '😤' },
      order: { name: '订单相关', color: '#f59e0b', emoji: '📦' },
      suggestion: { name: '建议反馈', color: '#10b981', emoji: '💡' },
      chitchat: { name: '闲聊', color: '#8b5cf6', emoji: '💬' },
      technical: { name: '技术问题', color: '#ec4899', emoji: '🔧' },
      other: { name: '其他', color: '#6b7280', emoji: '📝' }
    };

    const sentimentConfig = {
      positive: { name: '正面', color: '#10b981', emoji: '😊' },
      neutral: { name: '中性', color: '#6b7280', emoji: '😐' },
      negative: { name: '负面', color: '#ef4444', emoji: '😞' }
    };

    const urgencyConfig = {
      urgent: { name: '紧急', color: '#ef4444', emoji: '🔴' },
      normal: { name: '普通', color: '#f59e0b', emoji: '🟡' },
      low: { name: '低', color: '#3b82f6', emoji: '🟢' }
    };

    // 嵌入的真实数据
    const embeddedData = [
      {"messageId":"5","timestamp":"2026-03-30T15:24:23.984Z","userId":"7722263190","username":"Jiajun Liu","content":"我现在心里有点难受","category":{"id":"other","name":"其他","confidence":0},"sentiment":{"label":"neutral","confidence":0.7},"urgency":{"level":"urgent","confidence":0.8},"keywords":["我现在心里有点难受"]},
      {"messageId":"6","timestamp":"2026-03-30T15:31:15.734Z","userId":"7722263190","username":"Jiajun Liu","content":"明天我想去钓鱼","category":{"id":"other","name":"其他","confidence":0},"sentiment":{"label":"neutral","confidence":0.7},"urgency":{"level":"low","confidence":0.6},"keywords":["明天我想去钓鱼"]},
      {"messageId":"7","timestamp":"2026-03-30T16:05:12.013Z","userId":"7722263190","username":"Jiajun Liu","content":"你这个产品质量也太差了吧，我要投诉你","category":{"id":"complaint","name":"投诉反馈","confidence":0.13},"sentiment":{"label":"negative","confidence":1},"urgency":{"level":"urgent","confidence":0.8},"keywords":["你这个产品质量也太差了吧","我要投诉你"]},
      {"messageId":"msg_1774858056559","timestamp":"2026-03-30T08:07:36.559Z","userId":"test-user","username":"Test User","content":"请问这个产品怎么使用？","category":{"id":"question","name":"问题咨询","confidence":0.22},"sentiment":{"label":"neutral","confidence":0.7},"urgency":{"level":"normal","confidence":0.7},"keywords":["请问这个产品怎么使用"]},
      {"messageId":"msg_1774858074847","timestamp":"2026-03-30T08:07:54.847Z","userId":"test-user","username":"Test User","content":"非常满意这次服务，谢谢你们！","category":{"id":"other","name":"其他","confidence":0},"sentiment":{"label":"positive","confidence":1},"urgency":{"level":"low","confidence":0.6},"keywords":["非常满意这次服务","谢谢你们"]},
      {"messageId":"msg_1774858074884","timestamp":"2026-03-30T08:07:54.888Z","userId":"test-user","username":"Test User","content":"系统报错了，无法登录","category":{"id":"technical","name":"技术问题","confidence":0.25},"sentiment":{"label":"neutral","confidence":0.7},"urgency":{"level":"urgent","confidence":0.6},"keywords":["系统报错了","无法登录"]},
      {"messageId":"msg_1774858075283","timestamp":"2026-03-30T08:07:55.283Z","userId":"test-user","username":"Test User","content":"我想投诉，订单一直没发货，太差了！","category":{"id":"order","name":"订单相关","confidence":0.25},"sentiment":{"label":"negative","confidence":1},"urgency":{"level":"urgent","confidence":0.8},"keywords":["我想投诉","订单一直没发货","太差了"]}
    ];

    let allMessages = [];
    let currentFilter = 'all';
    let categoryChart = null;
    let sentimentChart = null;

    async function loadData() {
      try {
        const response = await fetch('http://localhost:3100/api/messages');
        if (response.ok) {
          allMessages = await response.json();
        } else {
          allMessages = embeddedData;
        }
      } catch (e) {
        allMessages = embeddedData;
      }
      
      updateStats();
      renderFilters();
      renderMessages();
      renderCharts();
      updateTime();
    }

    function updateTime() {
      document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
    }

    function updateStats() {
      const stats = { 
        total: allMessages.length, 
        question: 0, 
        complaint: 0, 
        order: 0, 
        technical: 0 
      };
      
      allMessages.forEach(m => {
        if (stats.hasOwnProperty(m.category?.id)) {
          stats[m.category.id]++;
        }
      });

      const cards = document.querySelectorAll('.stat-card');
      cards[0].querySelector('.stat-value').textContent = stats.total;
      cards[1].querySelector('.stat-value').textContent = stats.question;
      cards[2].querySelector('.stat-value').textContent = stats.complaint;
      cards[3].querySelector('.stat-value').textContent = stats.order;
      cards[4].querySelector('.stat-value').textContent = stats.technical;
    }

    function renderFilters() {
      const catCount = {};
      allMessages.forEach(m => {
        catCount[m.category?.id] = (catCount[m.category?.id] || 0) + 1;
      });

      let html = `<button class="filter-btn active" onclick="setFilter('all')">
        全部 <span class="filter-count">${allMessages.length}</span>
      </button>`;

      Object.entries(categoryConfig).forEach(([id, c]) => {
        const count = catCount[id] || 0;
        if (count > 0) {
          html += `<button class="filter-btn" onclick="setFilter('${id}')">
            ${c.emoji} ${c.name} <span class="filter-count">${count}</span>
          </button>`;
        }
      });

      document.getElementById('filters').innerHTML = html;
    }

    function setFilter(id) {
      currentFilter = id;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(id === 'all' ? '全部' : categoryConfig[id]?.name));
      });
      renderMessages();
    }

    function renderMessages() {
      const filtered = currentFilter === 'all' 
        ? allMessages 
        : allMessages.filter(m => m.category?.id === currentFilter);

      document.getElementById('messageCount').textContent = `共 ${filtered.length} 条消息`;

      if (filtered.length === 0) {
        document.getElementById('messageList').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>暂无消息</p>
          </div>
        `;
        return;
      }

      const html = filtered.map(m => {
        const initial = (m.username || '匿名')[0].toUpperCase();
        const catId = m.category?.id || 'other';
        const sentLabel = m.sentiment?.label || 'neutral';
        const urgLevel = m.urgency?.level || 'normal';

        return `
          <div class="message-item">
            <div class="message-header">
              <div class="message-user">
                <div class="user-avatar">${initial}</div>
                <div class="user-info">
                  <span class="user-name">${m.username || '匿名'}</span>
                  <span class="user-id">ID: ${m.userId || '-'}</span>
                </div>
              </div>
              <span class="message-time">${formatTime(m.timestamp)}</span>
            </div>
            <div class="message-content">${m.content}</div>
            <div class="message-tags">
              <span class="tag category-${catId}">
                ${categoryConfig[catId]?.emoji || '📝'} ${m.category?.name || '其他'}
              </span>
              <span class="tag sentiment-${sentLabel}">
                ${sentimentConfig[sentLabel]?.emoji} ${sentimentConfig[sentLabel]?.name}
              </span>
              <span class="tag urgency-${urgLevel}">
                ${urgencyConfig[urgLevel]?.emoji} ${urgencyConfig[urgLevel]?.name}
              </span>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('messageList').innerHTML = html;
    }

    function renderCharts() {
      // Category Pie Chart
      const catCount = {};
      allMessages.forEach(m => {
        catCount[m.category?.id] = (catCount[m.category?.id] || 0) + 1;
      });

      const catLabels = [];
      const catData = [];
      const catColors = [];

      Object.entries(categoryConfig).forEach(([id, c]) => {
        if (catCount[id]) {
          catLabels.push(c.name);
          catData.push(catCount[id]);
          catColors.push(c.color);
        }
      });

      if (categoryChart) categoryChart.destroy();
      categoryChart = new Chart(document.getElementById('categoryChart'), {
        type: 'doughnut',
        data: {
          labels: catLabels,
          datasets: [{
            data: catData,
            backgroundColor: catColors,
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { padding: 15, usePointStyle: true }
            }
          }
        }
      });

      // Sentiment Pie Chart
      const sentCount = { positive: 0, neutral: 0, negative: 0 };
      allMessages.forEach(m => sentCount[m.sentiment?.label || 'neutral']++);

      if (sentimentChart) sentimentChart.destroy();
      sentimentChart = new Chart(document.getElementById('sentimentChart'), {
        type: 'doughnut',
        data: {
          labels: ['正面', '中性', '负面'],
          datasets: [{
            data: [sentCount.positive, sentCount.neutral, sentCount.negative],
            backgroundColor: ['#10b981', '#6b7280', '#ef4444'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { padding: 15, usePointStyle: true }
            }
          }
        }
      });

      // Urgency Bar Chart
      const urgCount = { urgent: 0, normal: 0, low: 0 };
      allMessages.forEach(m => urgCount[m.urgency?.level || 'normal']++);

      const urgHtml = Object.entries(urgencyConfig).map(([id, c]) => {
        const count = urgCount[id];
        const percent = allMessages.length ? (count / allMessages.length * 100) : 0;
        return `
          <div class="bar-item">
            <span class="bar-label">${c.emoji} ${c.name}</span>
            <div class="bar-track">
              <div class="bar-fill" style="width:${percent}%;background:${c.color}"></div>
            </div>
            <span class="bar-value">${count}</span>
          </div>
        `;
      }).join('');

      document.getElementById('urgencyChart').innerHTML = urgHtml;
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
      if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
      return d.toLocaleDateString('zh-CN');
    }

    // Init
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
